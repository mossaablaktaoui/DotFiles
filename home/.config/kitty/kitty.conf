# vim:filetype=kitty
#
# Kitty configuration – mirrors ~/.config/wezterm/wezterm.lua

## -- Appearance --------------------------------------------------------------

font_family            JetBrains Mono
font_size              13.0
background_opacity     0.8
# matches wezterm window_decorations = "RESIZE"
# NOTE: if the title bar is still visible after changing this, you need
# to fully QUIT kitty (not just reload) and restart it.
# On GNOME, you may also need a GNOME extension like "Unite" or "Pixel Saver"
# to hide titlebars — kitty cannot override GNOME's CSD.
hide_window_decorations all
# matches wezterm window_padding = {0,0,0,0}
window_padding_width   0

## -- Tab bar -----------------------------------------------------------------
## NOTE: kitty always shows the tab bar (no hide_tab_bar_if_only_one_tab equivalent)

tab_bar_style           powerline
tab_bar_edge            top

## -- Layout ------------------------------------------------------------------

enabled_layouts         splits

## -- Colours (Tokyo Night) ----------------------------------------------------

foreground              #a9b1d6
background              #1a1b26
selection_foreground    #1a1b26
selection_background    #7aa2f7

cursor                  #c0caf5
cursor_text_color       #1a1b26

url_color               #7aa2f7

# black
color0                  #32344a
color8                  #444b6a

# red
color1                  #f7768e
color9                  #ff9e64

# green
color2                  #9ece6a
color10                 #73daca

# yellow
color3                  #e0af68
color11                 #e0af68

# blue
color4                  #7aa2f7
color12                 #7aa2f7

# magenta
color5                  #bb9af7
color13                 #bb9af7

# cyan
color6                  #7dcfff
color14                 #7dcfff

# white
color7                  #a9b1d6
color15                 #c0caf5

# tab bar
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #a9b1d6
inactive_tab_background #1f2335
tab_bar_background      #15161e

## -- Keybindings (mapped from wezterm) ---------------------------------------

## Tabs
map ctrl+shift+t       new_tab
map ctrl+shift+w       close_tab
map ctrl+tab           next_tab
map ctrl+shift+tab     previous_tab

## Splits (panes)
## SWAPPED: the user considers these the wrong way around vs wezterm
map alt+backslash      launch --location=vsplit
map alt+slash          launch --location=hsplit
map alt+e              close_window

## Move between panes (Alt + hjkl)
map alt+h              neighboring_window left
map alt+j              neighboring_window down
map alt+k              neighboring_window up
map alt+l              neighboring_window right
map alt+w              neighboring_window

## Resize panes (Alt+Shift + HJKL)
map alt+shift+h        resize_window thinner
map alt+shift+j        resize_window shorter
map alt+shift+k        resize_window taller
map alt+shift+l        resize_window wider

## Clipboard
map alt+y              copy_to_clipboard
map alt+p              paste_from_clipboard

## Scroll (Ctrl+Shift + j/k)
map ctrl+shift+j       scroll_line_down
map ctrl+shift+k       scroll_line_up

## Zoom / focus
map alt+f              toggle_fullscreen

## Copy mode → scrollback buffer
map alt+c              show_scrollback

## NOT MAPPED (no kitty equivalent):
##   Alt+r    → RotatePanes (clockwise)
##   Ctrl+Alt+n → 3-pane layout (custom Lua)
